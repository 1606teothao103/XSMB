<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quét XSMB</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            border: 2px solid #0f0;
            padding: 30px;
            box-shadow: 0 0 20px #0f0;
            text-align: center;
            background: rgba(0, 20, 0, 0.8);
            border-radius: 15px;
        }

        h2 {
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px;
            width: 250px;
            text-align: center;
            font-size: 1.3rem;
            outline: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        input:focus {
            box-shadow: 0 0 15px #0f0;
            background: #000;
        }

        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.4s;
            text-transform: uppercase;
            box-shadow: 0 0 10px #0f0;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 30px #0f0;
            transform: scale(1.05);
        }

        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9rem;
            height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>MÁY QUÉT DỮ LIỆU</h2>
    
    <div class="input-group">
        <input type="text" id="gdb" placeholder="Giải Đặc Biệt (5 số)" maxlength="6" autocomplete="off">
    </div>
    
    <div class="input-group">
        <input type="text" id="g1" placeholder="Giải Nhất (5 số)" maxlength="5" autocomplete="off">
    </div>

    <button id="btnScan" onclick="updateGist()">Bắt Đầu Giải Mã</button>
    
    <div class="status" id="statusText"></div>
</div>

<script>
    // --- CẤU HÌNH GITHUB ---
    // Bạn thay Token và Gist ID của bạn vào đây
    const GITHUB_TOKEN = "TOKEN_CỦA_BẠN"; 
    const GIST_ID = "ID_GIST_CỦA_BẠN";

    async function updateGist() {
        const gdb = document.getElementById('gdb').value.trim();
        const g1 = document.getElementById('g1').value.trim();
        const btn = document.getElementById('btnScan');
        const status = document.getElementById('statusText');

        // Ghép dãy số (thường là 5+5 = 10 số)
        const combinedData = gdb + g1;

        if (combinedData.length < 10) {
            alert("Vui lòng nhập đủ các con số!");
            return;
        }

        // Vô hiệu hóa nút để tránh bấm nhiều lần
        btn.disabled = true;
        btn.innerText = "ĐANG TRUYỀN TIN...";
        status.innerText = "Đang kết nối với cơ sở dữ liệu GitHub...";

        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: {
                    "Authorization": `Bearer ${GITHUB_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    files: {
                        "xsmb_data.txt": {
                            content: combinedData
                        }
                    }
                })
            });

            if (response.ok) {
                status.innerText = "Truyền tin thành công! Đang chuyển hướng...";
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } else {
                throw new Error("Lỗi phản hồi từ GitHub");
            }
        } catch (error) {
            console.error(error);
            alert("Lỗi kết nối! Kiểm tra Token và Gist ID.");
            btn.disabled = false;
            btn.innerText = "Thử Lại";
            status.innerText = "";
        }
    }
</script>

</body>
</html>
