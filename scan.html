<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Quét XSMB - Hệ Thống Chốt Số</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 2px solid #0f0; padding: 30px; box-shadow: 0 0 20px #0f0; text-align: center; background: rgba(0, 20, 0, 0.9); border-radius: 15px; }
        h2 { text-shadow: 0 0 10px #0f0; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 260px; text-align: center; font-size: 1.3rem; outline: none; border-radius: 5px; }
        button { background: #0f0; color: #000; border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.4s; text-transform: uppercase; }
        button:hover:not(:disabled) { background: #fff; box-shadow: 0 0 30px #0f0; transform: scale(1.05); }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        #lock-msg { color: #f00; margin-top: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG GỬI SỐ</h2>
    <div class="input-group">
        <input type="text" id="gdb" placeholder="Giải Đặc Biệt" maxlength="6">
    </div>
    <div class="input-group">
        <input type="text" id="g1" placeholder="Giải Nhất" maxlength="5">
    </div>
    <button id="btnScan" onclick="updateGist()">Gửi Dữ Liệu</button>
    <div id="lock-msg">HỆ THỐNG ĐÃ KHÓA (SAU 17:30)</div>
</div>

<script>
    const GITHUB_TOKEN = "TOKEN_CỦA_BẠN";
    const GIST_ID = "ID_GIST_CỦA_BẠN";

    function checkLock() {
        const now = new Date();
        const time = now.getHours() * 100 + now.getMinutes();
        if (time >= 1730) {
            document.getElementById('btnScan').disabled = true;
            document.getElementById('lock-msg').style.display = 'block';
            return true;
        }
        return false;
    }

    async function updateGist() {
        if (checkLock()) return;

        const combinedData = document.getElementById('gdb').value + document.getElementById('g1').value;
        if (combinedData.length < 10) return alert("Chưa nhập đủ số!");

        const btn = document.getElementById('btnScan');
        btn.innerText = "ĐANG TRUYỀN TIN...";
        btn.disabled = true;

        try {
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: "PATCH",
                headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
                body: JSON.stringify({ files: { "xsmb_data.txt": { content: combinedData } } })
            });

            if (response.ok) {
                window.location.href = 'index.html';
            } else {
                alert("Lỗi kết nối GitHub!");
                btn.disabled = false;
                btn.innerText = "GỬI DỮ LIỆU";
            }
        } catch (e) { alert("Lỗi!"); btn.disabled = false; }
    }

    // Kiểm tra ngay khi mở trang
    checkLock();
</script>
</body>
</html>
