<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gương Thần Dự Đoán</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #sequence-display { font-size: 2.8rem; letter-spacing: 12px; color: #0f0; text-shadow: 0 0 15px #0f0; margin-bottom: 40px; transition: all 1s; }
        
        .sphere-wrapper { position: relative; width: 220px; height: 220px; display: none; opacity: 0; transition: opacity 1.5s; }
        .magic-sphere { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #70f 30%, #10a 60%, #000 100%); box-shadow: 0 0 50px 15px #70f, inset 0 0 60px #000; position: absolute; animation: rotate 5s linear infinite, float 3s ease-in-out infinite; }
        .energy-mist { width: 100%; height: 100%; border-radius: 50%; position: absolute; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100" height="100" filter="url(%23n)" opacity="0.4"/></svg>'); animation: pulse 2s infinite alternate; }

        #final-box { font-size: 6rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px #f00, 0 0 40px #ff0; display: none; opacity: 0; transform: scale(0.3); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .status-tag { margin-top: 20px; letter-spacing: 3px; font-weight: bold; padding: 5px 15px; border-radius: 5px; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(1); } 100% { opacity: 0.7; transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="sequence-display">CONNECTING...</div>

    <div class="sphere-wrapper" id="sphere-area">
        <div class="magic-sphere"><div class="energy-mist"></div></div>
    </div>

    <div id="final-box"></div>
    <div class="status-tag" id="status-sub">SYSTEM READY</div>

    <script>
        const GIST_ID = "c79db9e5062c13d9ed7bd354f59ea3b8";

        async function initMagic() {
            const display = document.getElementById('sequence-display');
            const sphere = document.getElementById('sphere-area');
            const final = document.getElementById('final-box');
            const sub = document.getElementById('status-sub');

            // 1. Lấy dữ liệu & Kiểm tra giờ
            const now = new Date();
            const isLocked = (now.getHours() * 100 + now.getMinutes()) >= 1730;
            
            let rawData;
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${now.getTime()}`);
                const json = await res.json();
                rawData = json.files["xsmb_data.txt"].content;
            } catch { rawData = "0000000000"; }

            // 2. Tính toán Pascal
            let current = rawData.split('').map(Number);
            while (current.length > 2) {
                let next = [];
                for(let i=0; i<current.length-1; i++) next.push((current[i]+current[i+1]) % 10);
                current = next;
            }
            const prediction = current.join('');

            // 3. Hiệu ứng Matrix
            for (let i = 0; i < 20; i++) {
                display.innerText = rawData.split('').map(() => Math.floor(Math.random()*10)).join('');
                await new Promise(r => setTimeout(r, 60));
            }
            display.innerText = rawData;
            await new Promise(r => setTimeout(r, 1000));

            // 4. Triệu hồi Quả cầu
            display.style.opacity = "0.2";
            sphere.style.display = 'block';
            setTimeout(() => sphere.style.opacity = '1', 100);
            await new Promise(r => setTimeout(r, 4000));

            // 5. Hiện số chốt
            sphere.style.opacity = '0';
            setTimeout(() => {
                sphere.style.display = 'none';
                display.style.display = 'none';
                final.innerText = prediction;
                final.style.display = 'block';
                setTimeout(() => { final.style.opacity = '1'; final.style.transform = 'scale(1)'; }, 50);
                
                if (isLocked) {
                    sub.innerText = "TRẠNG THÁI: DỮ LIỆU ĐÃ KHÓA";
                    sub.style.backgroundColor = "#f00";
                    sub.style.color = "#fff";
                } else {
                    sub.innerText = "TRẠNG THÁI: ĐANG DỰ ĐOÁN";
                    sub.style.color = "#0f0";
                }
            }, 1000);
        }

        window.onload = initMagic;
    </script>
</body>
</html>
