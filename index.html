<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THẦN TÀI SỐ</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; width: 100%; max-width: 450px; padding: 20px; }
        
        /* Nhập liệu */
        h2 { text-shadow: 0 0 10px #0f0; margin-bottom: 25px; letter-spacing: 2px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 15px; width: 85%; text-align: center; font-size: 1.5rem; outline: none; border-radius: 10px; margin-bottom: 15px; }
        button { background: #0f0; color: #000; border: none; padding: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 50px; width: 90%; box-shadow: 0 0 15px #0f0; text-transform: uppercase; }

        /* Quả cầu */
        #magic-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        .sphere-wrapper { position: relative; width: 180px; height: 180px; margin: 20px 0; }
        .magic-sphere { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #70f 30%, #10a 60%, #000 100%); box-shadow: 0 0 60px 15px #70f; animation: rotate 4s linear infinite, float 3s ease-in-out infinite; }
        
        /* Hiển thị kết quả */
        .result-container { display: none; justify-content: space-around; width: 100%; margin-top: 20px; opacity: 0; transition: opacity 1s; }
        .result-item { text-align: center; flex: 1; }
        .result-label { font-size: 0.7rem; color: #aaa; margin-bottom: 10px; }
        .final-number { font-size: 5.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px #f00, 0 0 40px #ff0; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        #matrix-text { font-size: 1.2rem; height: 1.5em; margin-bottom: 10px; color: #0f0; }
    </style>
</head>
<body>

    <div id="input-area" class="container">
        <h2>THẦN TÀI TÌM SỐ</h2>
        <input type="number" id="gdb" placeholder="Giải Đặc Biệt (5-6 số)">
        <input type="number" id="g1" placeholder="Giải Nhất (5 số)">
        <br><br>
        <button onclick="startMagic()">LẤY CẶP SỐ MAY MẮN</button>
    </div>

    <div id="magic-area" class="container">
        <div id="matrix-text">BẮT ĐẦU GỌI THẦN TÀI...</div>
        <div class="sphere-wrapper">
            <div class="magic-sphere"></div>
        </div>
        
        <div class="result-container" id="res-box">
            <div class="result-item">
                <div class="result-label">CÁCH 1 (GĐB + G1)</div>
                <div class="final-number" id="num1">--</div>
            </div>
            <div class="result-item">
                <div class="result-label">CÁCH 2 (G1 + GĐB)</div>
                <div class="final-number" id="num2">--</div>
            </div>
        </div>
        
        <p id="status-text" style="margin-top: 30px; font-size: 0.8rem; color: #444;">ĐANG TÌM SỐ MAY MẮN</p>
    </div>

    <script>
        function calculatePascal(str) {
            let nums = str.split('').map(Number);
            while (nums.length > 2) {
                let next = [];
                for (let i = 0; i < nums.length - 1; i++) {
                    next.push((nums[i] + nums[i + 1]) % 10);
                }
                nums = next;
            }
            return nums.join('');
        }

        async function startMagic() {
            const gdb = document.getElementById('gdb').value;
            const g1 = document.getElementById('g1').value;

            if (gdb.length < 5 || g1.length < 5) {
                alert("Vui lòng nhập đủ số cho cả 2 giải!");
                return;
            }

            document.getElementById('input-area').style.display = 'none';
            document.getElementById('magic-area').style.display = 'flex';

            const matrix = document.getElementById('matrix-text');
            const resBox = document.getElementById('res-box');
            const status = document.getElementById('status-text');

            // Hiệu ứng chạy chữ Matrix
            const modes = ["THIÊN LINH LINH...", "ĐỊA LINH LINH...", "THẦN TÀI GÕ CỬA...", "SỐ ĐỀ HIỆN RA..."];
            for (let m of modes) {
                matrix.innerText = m;
                await new Promise(r => setTimeout(r, 800));
            }

            // Tính toán 2 kết quả
            const r1 = calculatePascal(số 1);
            const r2 = calculatePascal(số 2);

            // Hiện kết quả
            document.querySelector('.sphere-wrapper').style.opacity = '0.3';
            status.innerText = "CẶP SỐ MAY MẮN HÔM NAY";
            status.style.color = "#0f0";

            resBox.style.display = 'flex';
            setTimeout(() => {
                resBox.style.opacity = '1';
                document.getElementById('num1').innerText = r1;
                document.getElementById('num2').innerText = r2;
            }, 100);
        }
    </script>
</body>
</html>
