<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gương Thần Dự Đoán</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        .container { text-align: center; transition: all 0.5s; width: 100%; max-width: 400px; padding: 20px; }
        
        /* Giao diện nhập liệu */
        h2 { text-shadow: 0 0 10px #0f0; margin-bottom: 25px; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 15px; width: 80%; text-align: center; font-size: 1.5rem; outline: none; border-radius: 10px; margin-bottom: 15px; box-shadow: inset 0 0 5px #0f0; }
        button { background: #0f0; color: #000; border: none; padding: 18px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 50px; transition: 0.4s; text-transform: uppercase; box-shadow: 0 0 15px #0f0; width: 85%; }
        button:hover { background: #fff; box-shadow: 0 0 30px #0f0; transform: scale(1.05); }

        /* Hiệu ứng Quả Cầu */
        #magic-area { display: none; flex-direction: column; align-items: center; }
        .sphere-wrapper { position: relative; width: 200px; height: 200px; margin: 30px 0; }
        .magic-sphere { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #70f 30%, #10a 60%, #000 100%); box-shadow: 0 0 60px 20px #70f; animation: rotate 4s linear infinite, float 3s ease-in-out infinite; }
        
        /* Số nhảy Matrix */
        #matrix-numbers { font-size: 2.5rem; letter-spacing: 8px; margin-bottom: 20px; height: 1.2em; }

        /* Kết quả cuối */
        #final-result { font-size: 7rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px #f00, 0 0 40px #ff0; display: none; transform: scale(0.5); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="input-area" class="container">
        <h2>MÁY QUÉT DỮ LIỆU</h2>
        <input type="number" id="gdb" placeholder="Giải Đặc Biệt" oninput="if(this.value.length > 6) this.value = this.value.slice(0,6);">
        <input type="number" id="g1" placeholder="Giải Nhất" oninput="if(this.value.length > 5) this.value = this.value.slice(0,5);">
        <br><br>
        <button onclick="startMagic()">LẤY SỐ MAY MẮN</button>
    </div>

    <div id="magic-area" class="container">
        <div id="matrix-numbers">0000000000</div>
        <div class="sphere-wrapper">
            <div class="magic-sphere"></div>
        </div>
        <div id="final-result">--</div>
        <p id="status-text" style="letter-spacing: 3px; font-size: 0.8rem; color: #555;">ĐANG GIẢI MÃ PHƯƠNG TRÌNH...</p>
    </div>

    <script>
        function calculatePascal(str) {
            let nums = str.split('').map(Number);
            while (nums.length > 2) {
                let next = [];
                for (let i = 0; i < nums.length - 1; i++) {
                    next.push((nums[i] + nums[i + 1]) % 10);
                }
                nums = next;
            }
            return nums.join('');
        }

        async function startMagic() {
            const gdb = document.getElementById('gdb').value;
            const g1 = document.getElementById('g1').value;
            const combined = gdb + g1;

            if (combined.length < 10) {
                alert("Vui lòng nhập đủ số Giải đặc biệt và Giải nhất!");
                return;
            }

            // Ẩn phần nhập, hiện phần quả cầu
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('magic-area').style.display = 'flex';

            const matrix = document.getElementById('matrix-numbers');
            const final = document.getElementById('final-result');
            const status = document.getElementById('status-text');

            // 1. Hiệu ứng số nhảy Matrix (2 giây)
            for (let i = 0; i < 30; i++) {
                matrix.innerText = Math.random().toString().slice(2, 12);
                await new Promise(r => setTimeout(r, 70));
            }
            matrix.innerText = combined;
            matrix.style.color = "#fff";

            // 2. Chờ quả cầu "hấp thụ" năng lượng (3 giây)
            await new Promise(r => setTimeout(r, 3000));

            // 3. Hiện kết quả cuối cùng
            const result = calculatePascal(combined);
            matrix.style.opacity = '0';
            document.querySelector('.sphere-wrapper').style.opacity = '0';
            
            setTimeout(() => {
                document.querySelector('.sphere-wrapper').style.display = 'none';
                matrix.style.display = 'none';
                
                final.innerText = result;
                final.style.display = 'block';
                status.innerText = "KẾT QUẢ ĐÃ ĐƯỢC CHỐT";
                status.style.color = "#f00";
                
                setTimeout(() => {
                    final.style.opacity = '1';
                    final.style.transform = 'scale(1)';
                }, 50);
            }, 500);
        }
    </script>
</body>
</html>
